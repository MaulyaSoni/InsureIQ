<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Markdown Preview</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; padding: 0.5em;
     margin: 0.5em 0;
     border-left: 4px solid #007acc;
     background-color: #f8f9fa;
   }
   .suggestion-item {
     margin-bottom: 1rem;
     padding: 1rem;
     border: 1px solid #e1e4e8;
     border-radius: 6px;
     background-color: white;
   }
   .suggestion-header {
     display: flex;
     justify-content: space-between;
     align-items: center;
     margin-bottom: 0.5rem;
   }
   .suggestion-title {
     font-weight: 600;
     color: #24292f;
   }
   .suggestion-status {
     padding: 0.25em 0.75em;
     border-radius: 12px;
     font-size: 0.875em;
     font-weight: 500;
   }
   .status-success { background-color: #d4edda; color: #155724; }
   .status-error { background-color: #f8d7da; color: #721c24; }
   .status-info { background-color: #d1ecf1; color: #0c5460; }
   .suggestion-description {
     color: #586069;
     margin-bottom: 1rem;
   }
   .suggestion-actions {
     display: flex;
     gap: 0.5rem;
     flex-wrap: wrap;
   }
   .btn {
     display: inline-block;
     font-weight: 600;
     text-align: center;
     white-space: nowrap;
     vertical-align: middle;
     user-select: none;
     border: 1px solid transparent;
     padding: 0.375rem 0.75rem;
     font-size: 1rem;
     line-height: 1.5;
     border-radius: 0.25rem;
     transition: color 0.15s ease-in-out,background-color 0.15s ease-in-out,border-color 0.15s ease-in-out,box-shadow 0.15s ease-in-out;
   }
   .btn-primary { color: #fff; background-color: #007acc; border-color: #007acc; }
   .btn-secondary { color: #24292f; background-color: #f8f9fa; border-color: #d0d7de; }
   .btn-outline { color: #007acc; background-color: transparent; border-color: #007acc; }
   .btn-danger { color: #fff; background-color: #d9534f; border-color: #d9534f; }
   .btn-success { color: #fff; background-color: #28a745; border-color: #28a745; }
   .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.875em; }
   .input-field {
     width: 100%;
     padding: 0.5rem;
     border: 1px solid #ced4da;
     border-radius: 0.25rem;
     font-size: 1rem;
   }
   .hidden { display: none; }
   .mt-1 { margin-top: 0.25rem; }
   .mb-2 { margin-bottom: 0.5rem; }
   .d-flex { display: flex; }
   .align-items-center { align-items: center; }
   .justify-content-between { justify-content: space-between; }
   .flex-wrap { flex-wrap: wrap; }
   .gap-2 { gap: 0.5rem; }
</script>
</head>
<body>
  <div class="container">
    <header class="mb-4">
      <h1>InsureIQ - Fix Application Status</h1>
      <p class="text-muted">Fix and apply solutions for backend issues</p>
    </header>

    <div id="status-overview">
      <h2>Status Overview</h2>
      <div class="status-item">
        <span class="status-label">Backend Status:</span>
        <span class="status-value" id="backend-status">Unknown</span>
      </div>
      <div class="status-item">
        <span class="status-label">Last Check:</span>
        <span class="status-value" id="last-check">Never</span>
      </div>
    </div>

    <div class="card mb-4">
      <h3>Apply Fixes</h3>
      <div class="suggestions-list" id="suggestions-list">
        <!-- Suggestions will be populated here -->
      </div>
    </div>

    <div class="card">
      <h3>Manual Fix Application</h3>
      <div class="mb-3">
        <label for="fix-script" class="form-label">Fix Script:</label>
        <select class="form-select" id="fix-script">
          <option value="">Select a fix script...</option>
          <option value="apply_fix.py">apply_fix.py</option>
          <option value="apply_fix2.py">apply_fix2.py</option>
          <option value="apply_fix3.py">apply_fix3.py</option>
          <option value="apply_part1.py">apply_part1.py</option>
          <option value="apply_part10.py">apply_part10.py</option>
          <option value="apply_part10_policy_details.py">apply_part10_policy_details.py</option>
          <option value="apply_part11.py">apply_part11.py</option>
          <option value="apply_part2.py">apply_part2.py</option>
          <option value="apply_part3.py">apply_part3.py</option>
          <option value="apply_part4.py">apply_part4.py</option>
          <option value="apply_part5.py">apply_part5.py</option>
          <option value="apply_part6.py">apply_part6.py</option>
          <option value="apply_part7_policies.py">apply_part7_policies.py</option>
          <option value="apply_part8_nodes.py">apply_part8_nodes.py</option>
          <option value="apply_part9_claim_prediction.py">apply_part9_claim_prediction.py</option>
          <option value="fix_bug1.py">fix_bug1.py</option>
        </select>
      </div>
      <div class="mb-3">
        <button class="btn btn-primary" id="apply-fix-btn">Apply Selected Fix</button>
      </div>
      <div id="fix-output" class="mt-3 p-3 border rounded" style="max-height: 300px; overflow-y: auto; display: none;">
        <h5>Output:</h5>
        <pre id="fix-output-content" class="mb-0"></pre>
      </div>
    </div>
  </div>

  <script>
    // Status checking
    async function checkBackendStatus() {
      try {
        const response = await fetch('http://localhost:8000/health');
        if (response.ok) {
          const data = await response.json();
          document.getElementById('backend-status').textContent = data.status === 'ok' ? 'Running' : 'Error';
          document.getElementById('backend-status').className = 
            data.status === 'ok' ? 'status-value status-success' : 'status-value status-error';
        } else {
          document.getElementById('backend-status').textContent = 'Error (HTTP ' + response.status + ')';
          document.getElementById('backend-status').className = 'status-value status-error';
        }
      } catch (error) {
        document.getElementById('backend-status').textContent = 'Not Running';
        document.getElementById('backend-status').className = 'status-value status-error';
      }
      document.getElementById('last-check').textContent = new Date().toLocaleTimeString();
    }

    // Fix application
    document.getElementById('apply-fix-btn').addEventListener('click', async () => {
      const script = document.getElementById('fix-script').value;
      if (!script) {
        alert('Please select a fix script');
        return;
      }

      const outputDiv = document.getElementById('fix-output');
      const outputContent = document.getElementById('fix-output-content');
      
      outputDiv.style.display = 'block';
      outputContent.textContent = 'Running ' + script + '...';

      try {
        const response = await fetch('/run_fix', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ script: script })
        });

        if (response.ok) {
          const result = await response.json();
          outputContent.textContent = result.output || 'Fix applied successfully';
          outputDiv.className = 'mt-3 p-3 border rounded bg-success text-white';
        } else {
          const error = await response.json();
          outputContent.textContent = 'Error: ' + (error.detail || 'Unknown error');
          outputDiv.className = 'mt-3 p-3 border rounded bg-danger text-white';
        }
      } catch (error) {
        outputContent.textContent = 'Error: ' + error.message;
        outputDiv.className = 'mt-3 p-3 border rounded bg-danger text-white';
      }
    });

    // Initial status check
    checkBackendStatus();
    setInterval(checkBackendStatus, 5000);
  </script>
</body>
</html>
