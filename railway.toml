[build]
builder = "nixpacks"
nixpacksPlan = """
{ nixpkgs = { channels = { nixpkgs = "23.11"; }; } }

packages = with pkgs; [
  python311
  python311Packages.pip
]

install = ''
  pip install --python-delete-existing-package-files -r requirements.txt
''

[deploy]
startCommand = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
healthcheckInterval = 10
